<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1.0, shrink-to-fit=no">
    <link href="images/favicon.png" rel="icon">
    <title>The Mist - Luxury Hotel HTML Template</title>
    <meta name="description" content="The Mist is responsive bootstrap 5 luxury hotel HTML template.">
    <meta name="author" content="harnishdesign.net">

    <!-- Stylesheet
	============================== -->
    <link rel="stylesheet" type="text/css" href="css/animate.min.css">
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <link rel="stylesheet" type="text/css" href="css/font-awesome/css/all.min.css">
	<link rel="stylesheet" type="text/css" href="css/swiper-bundle.min.css">
	<link rel="stylesheet" type="text/css" href="css/glightbox.min.css">
    <link rel="stylesheet" type="text/css" href="css/daterangepicker.min.css">
    <link rel="stylesheet" type="text/css" href="css/stylesheet.css">
</head>

<body>
    <!-- Preloader -->
    <div class="preloader">
        <div class="lds-ellipsis">
            <div></div>
            <div></div>
            <div></div>
            <div></div>
        </div>
    </div>
    <!-- Preloader End -->

    <!-- Document Wrapper
	=============================== -->
    <div id="main-wrapper">
        
        <!-- Content
		============================================= -->
        <div id="content" role="main">

            <!-- Intro
			============================================= -->
			<section class="hero-wrap">
				<!-- Images Slideshow -->
				<div class="hero-bg swiper" data-effect="fade" data-speed="1500" data-loop="true" data-autoplay="true" data-margin="0" data-items-xs="1" data-items-sm="1" data-items-md="1" data-items-lg="1">
					<div class="swiper-wrapper">
						<div class="swiper-slide">
							<div class="hero-mask bg-dark opacity-6"></div>
							<div class="slide-bg" style="background-image: url('images/slider/slide-1.jpg');"></div>
						</div>
						<div class="swiper-slide">
							<div class="hero-mask bg-dark opacity-6"></div>
							<div class="slide-bg" style="background-image: url('images/slider/slide-2.jpg');"></div>
						</div>
					</div>
				</div>
				
				<div class="hero-content section d-flex flex-column min-vh-100">
					<div class="container my-auto text-center">
						<div class="mb-5 wow fadeInUp">
							<a class="logo" href="index.html"> <img src="images/logo.png" alt=""> </a>
						</div>
						<p class="text-3 text-light text-uppercase fw-600 ls-2 wow fadeInUp" data-wow-delay=".2s">
							<span class="rounded-pill border border-white border-opacity-50 px-3 py-1">Our website is under construction</span>
						</p>
						<h1 class="heading-font-family text-21 fw-700 text-white wow fadeInUp" data-wow-delay=".4s">Coming Soon</h1>
						
						<!-- Call for Inquiry -->
						<div class="border border-opacity-25 border-light rounded-4 p-3 d-inline-flex align-items-center gap-3 mt-4 wow fadeInUp" data-wow-delay=".6s">
							<div class="text-primary text-7 d-inline-flex"><i class="fa-solid fa-phone-volume"></i></div>
							<div class="vr my-1 opacity-1 bg-white"></div>
							<div class="text-start">
								<div class="text-2 fw-600 text-light mb-1">Call for Inquiry:</div>
								<h3 class="text-5 fw-700 text-white mb-0">(+060) 444 5346</h3>
							</div>
						</div>
						<!-- Call for Inquiry End -->
						
						<!-- Social Icons -->
						<ul class="social-icons social-icons-light justify-content-center mt-4 wow fadeInUp" data-wow-delay=".8s">
							<li><a data-bs-toggle="tooltip" href="http://www.facebook.com/" target="_blank" title="Facebook"><i class="fa-brands fa-facebook-f"></i></a></li>
							<li><a data-bs-toggle="tooltip" href="http://www.x.com/" target="_blank" title="X"><i class="fa-brands fa-x-twitter"></i></a></li>
							<li><a data-bs-toggle="tooltip" href="http://www.instagram.com/" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a></li>
							<li><a data-bs-toggle="tooltip" href="http://www.whatsapp.com/" target="_blank" title="WhatsApp"><i class="fa-brands fa-whatsapp"></i></a></li>
						</ul>
						
					</div>
				</div>
			</section>
			<!-- Intro end -->
        </div>
        <!-- Content end -->
    </div>
    <!-- Document Wrapper end -->

    <!-- Back to Top
	============================================= -->
    <a id="back-to-top" href="javascript:void(0)"><i class="fa-solid fa-angle-up"></i></a>

	<!-- JavaScript -->
    <script src="js/jquery.min.js"></script>
    <script src="js/bootstrap.bundle.min.js"></script>
	<script src="js/swiper-bundle.min.js"></script>
	<script src="js/glightbox.min.js"></script>
    <script src="js/jarallax.min.js"></script>
	<script src="js/wow.min.js"></script>
    
    <!-- Custom Script -->
    <script src="js/main.js"></script>
</body>
</html>
